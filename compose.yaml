services:
  nginx:
    image: "docker.io/nginx:1.29.4-alpine"
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes: 
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /home/lauri/lateoy.fi/nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/lauri/nginx/conf.d:/etc/nginx/conf.d:ro
      - /var/log:/var/log
      - /www-data:/www-data:ro

  testit:
    build: 
      dockerfile: ./ContainerfileTestit
    container_name: testit
    privileged: true
    volumes:
      - /home/lauri/projektit/lateoy.fi:/home/lauri/lateoy.fi

  tofu:
    build: 
      dockerfile: ./ContainerfileTofu
    container_name: tofu
    environment:
      - LINODE_TOKEN=${LINODE_CLI_TOKEN}
    volumes: 
      - /home/lauri/projektit/lateoy.fi/tofut:/local
